<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Career Line</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">Career Line</div>
            <div>
                <span id="studentName" style="color: white; margin-right: 20px;"></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Dashboard -->
    <div class="dashboard">
        <div class="dashboard-header">
            <div class="container">
                <h1>Student Dashboard</h1>
            </div>
        </div>

        <div class="dashboard-content">
            <div class="container">
                <div class="dashboard-grid">
                    
                    <!-- Fee Status Card -->
                    <div class="dashboard-card" style="background: linear-gradient(135deg, #00506b, #10a6d0); color: white;">
                        <h3 style="color: white; border-bottom-color: rgba(255,255,255,0.3);">💰 Fee Status</h3>
                        <div id="feeStatus" style="padding: 20px 0;">
                            <div style="margin-bottom: 20px;">
                                <p style="font-size: 0.9rem; opacity: 0.9;font-weight: bold; margin-bottom: 5px; color :black">Total Fee</p>
                                <p style="font-size: 2rem; font-weight: bold; margin: 0;" id="totalFeeAmount">₹0</p>
                            </div>
                            <div style="margin-bottom: 20px;">
                                <p style="font-size: 0.9rem; opacity: 0.9;font-weight: bold; margin-bottom: 5px; color :black">Fee Paid</p>
                                <p style="font-size: 1.8rem; font-weight: bold; margin: 0; color: #4CAF50;" id="feePaidAmount">₹0</p>
                            </div>
                            <div style="padding: 20px; background: rgba(0, 0, 0, 0.2); border-radius: 10px; margin-top: 20px;">
                                <p style="font-size: 0.9rem; opacity: 0.9;font-weight: bold; margin-bottom: 5px; color :black   ">Pending Amount</p>
                                <p style="font-size: 2.5rem; font-weight: bold; margin: 0; color: #FFB800;" id="feePendingAmount">₹0</p>
                            </div>
                            <!-- <div style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.15); border-radius: 8px;">
                                <p style="font-size: 0.9rem; margin: 0;" id="feeStatusMessage">Loading fee details...</p>
                            </div> -->
                        </div>
                    </div>

                    <!-- Attendance Card -->
                    <div class="dashboard-card">
                        <h3>📊 Attendance Overview</h3>
                        <div id="attendanceStats">
                            <p>Total Classes: <strong id="totalClasses">0</strong></p>
                            <p>Classes Attended: <strong id="attendedClasses">0</strong></p>
                            <p>Attendance Percentage: <strong id="attendancePercentage" style="color: #3498db; font-size: 1.5rem;">0%</strong></p>
                        </div>
                    </div>

                    <!-- Timetable Card -->
                    <div class="dashboard-card">
                        <h3>📅 Weekly Timetable</h3>
                        <table class="timetable-table" id="timetableTable">
                            <thead>
                                <tr>
                                    <th>Day</th>
                                    <th>Time</th>
                                    <th>Subject</th>
                                    <th>Teacher</th>
                                </tr>
                            </thead>
                            <tbody id="timetableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>

                    <!-- Notices Card -->
                    <div class="dashboard-card">
                        <h3>📢 Important Notices</h3>
                        <div id="noticesContainer">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

   <script>
const API_BASE_URL = 'http://localhost:5000/api';

window.onload = function() {
    checkAuth();
    loadStudentData();
};

function checkAuth() {
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('userRole');
    const name = localStorage.getItem('userName');
    
    if (!token || role !== 'student') {
        window.location.href = 'login.html';
        return;
    }
    
    document.getElementById('studentName').textContent = '👨‍🎓 ' + (name || 'Student');
}

function logout() {
    if (confirm('Are you sure you want to logout?')) {
        localStorage.clear();
        window.location.href = 'index.html';
    }
}

async function loadStudentData() {
    const email = localStorage.getItem('userEmail');
    if (!email) {
        console.error('No email found');
        return;
    }
    
    try {
        // Load student details and fee
        const studentResponse = await fetch(`${API_BASE_URL}/students/email/${encodeURIComponent(email)}`);
        const studentData = await studentResponse.json();
        
        if (studentData.success) {
            const student = studentData.data;
            displayFeeInfo(student);
        }
        
        // Load attendance
        const attendanceResponse = await fetch(`${API_BASE_URL}/attendance/student/${encodeURIComponent(email)}`);
        const attendanceData = await attendanceResponse.json();
        
        if (attendanceData.success) {
            displayAttendance(attendanceData.stats);
        }
        
        // Load timetable
        const studentClass = studentData.data.class;
        const timetableResponse = await fetch(`${API_BASE_URL}/timetable/class/${studentClass}`);
        const timetableData = await timetableResponse.json();
        
        if (timetableData.success) {
            displayTimetable(timetableData.data);
        }
        
    } catch (error) {
        console.error('Error loading student data:', error);
    }
}

function displayFeeInfo(student) {
    document.getElementById('totalFeeAmount').textContent = '₹' + (student.totalFee || 0);
    document.getElementById('feePaidAmount').textContent = '₹' + (student.feePaid || 0);
    const pending = (student.totalFee || 0) - (student.feePaid || 0);
    document.getElementById('feePendingAmount').textContent = '₹' + pending;
}

function displayAttendance(stats) {
    document.getElementById('totalClasses').textContent = stats.total || 0;
    document.getElementById('attendedClasses').textContent = stats.present || 0;
    document.getElementById('attendancePercentage').textContent = stats.percentage + '%';
}

function displayTimetable(timetable) {
    const tbody = document.getElementById('timetableBody');
    
    if (timetable.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 20px;">No timetable available</td></tr>';
        return;
    }
    
    tbody.innerHTML = timetable.map(entry => `
        <tr>
            <td>${entry.day}</td>
            <td>${entry.time}</td>
            <td>${entry.subject}</td>
            <td>${entry.teacher || 'Not assigned'}</td>
        </tr>
    `).join('');
}
</script>
</body>
</html>
